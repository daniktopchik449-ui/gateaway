<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iMessage iOS 18 Clone</title>
<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif}

.phone{width:375px;height:812px;background:#000;border-radius:0;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
.header{background:#1c1c1e;display:flex;flex-direction:column;align-items:center;padding-top:10px}

/* STATUS BAR */
.status-bar{
  width:100%;
  padding:6px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-sizing:border-box;
}

.status-left,.status-right{
  display:flex;
  align-items:center;
  gap:6px;
  height:20px;
}

#time{font-size:16px;font-weight:700;color:#fff;line-height:1}

/* FIX ALL ICON ALIGN */
.nav-arrow,
.network-bars,
.status-4g,
.battery-container{
  display:flex;
  align-items:center;
  height:20px;
}

.nav-arrow svg{width:14px;height:14px}

.network-bars{gap:2px}
.bar{width:3px;background:#fff;border-radius:1px}
.bar.b1{height:6px}
.bar.b2{height:8px}
.bar.b3{height:10px}
.bar.b4{height:12px}

.status-4g{font-size:12px;font-weight:800;color:#fff}

.battery-container{
  width:28px;
  height:14px;
  background:#2c2c2e;
  border-radius:2px;
  position:relative;
  justify-content:center;
}

.battery-fill{
  position:absolute;
  left:2px;top:2px;bottom:2px;
  width:67%;
  background:#fff;
}

.battery-text{font-size:10px;font-weight:900;color:#000;z-index:2}

.battery-tip{
  width:2px;height:6px;background:#555;
  position:absolute;right:-3px;
}

/* HEADER TOP */
.header-top{width:100%;padding:6px 16px;display:flex}

.back-btn{color:#0a84ff;font-size:18px;font-weight:600;display:flex;align-items:center;text-decoration:none}
.back-btn span{font-size:26px;margin-right:4px;line-height:1}

/* PROFILE */
.avatar-container{display:flex;flex-direction:column;align-items:center;margin-top:8px}

.avatar{width:56px;height:56px;background:#8e8e93;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.avatar svg{width:34px;height:34px}

.name-row{display:flex;align-items:center;gap:4px}

.name{color:#fff;font-size:15px;font-weight:600}
.name-arrow{color:#6e6e73;font-size:15px}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column}
.center-info{text-align:center;font-size:12px;color:#8e8e93;margin:10px 0 20px}

.msg{max-width:75%;padding:10px 16px;border-radius:20px;font-size:17px;line-height:1.4;margin-bottom:6px}
.msg.left{background:#2c2c2e;color:#fff;align-self:flex-start}
.msg.right{background:#34c759;color:#fff;align-self:flex-end;border-bottom-right-radius:6px}

.msg-link{color:#0a84ff;font-weight:500;text-decoration:none}

/* INPUT */
.controls{padding:10px 15px 30px;border-top:.5px solid #1c1c1e}
.input-box{display:flex;align-items:center;background:#1c1c1e;border-radius:22px;padding:6px 12px}
textarea{flex:1;background:transparent;border:none;color:#fff;font-size:16px;padding:8px;outline:none}
.send-btn{background:#34c759;width:32px;height:32px;border-radius:50%;border:none;color:#fff;font-size:16px}
</style>
</head>
<body>

<div class="phone">

  <div class="header">

    <div class="status-bar">
      <div class="status-left">
        <div id="time">18:17</div>
        <div class="nav-arrow">
          <svg viewBox="0 0 24 24" fill="white"><path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>
        </div>
      </div>
      <div class="status-right">
        <div class="network-bars">
          <div class="bar b1"></div><div class="bar b2"></div><div class="bar b3"></div><div class="bar b4"></div>
        </div>
        <div class="status-4g">4G</div>
        <div class="battery-container">
          <div class="battery-fill"></div>
          <div class="battery-text">67</div>
          <div class="battery-tip"></div>
        </div>
      </div>
    </div>

    <div class="header-top">
      <a href="#" class="back-btn"><span>‹</span>15</a>
    </div>

    <div class="avatar-container">
      <div class="avatar">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="name-row">
        <div class="name">7000</div>
        <div class="name-arrow">›</div>
      </div>
    </div>

  </div>

  <div class="chat" id="chat">
    <div class="center-info">Text Message<br>Today <span id="centerTimeText">18:17</span></div>
  </div>

  <div class="controls">
    <div class="input-box">
      <textarea id="text" rows="1" placeholder="iMessage"></textarea>
      <button class="send-btn" onclick="generate()">↑</button>
    </div>
  </div>
</div>

<script>
function getMDTime(offset=0){const now=new Date();const date=new Date(now.getTime()+offset);return date.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Chisinau'})}
function updateTime(){const t=getMDTime();document.getElementById('time').innerText=t;document.getElementById('centerTimeText').innerText=t}
setInterval(updateTime,1000);updateTime();

function generate(){
const input=document.getElementById('text');
const chat=document.getElementById('chat');
const num=input.value.trim();
if(!num)return;

const myMsg=document.createElement('div');
myMsg.className='msg right';
myMsg.innerText=num;
chat.appendChild(myMsg);

setTimeout(()=>{
const procMsg=document.createElement('div');
procMsg.className='msg left';
procMsg.innerText="Solicitarea este in curs de procesare.";
chat.appendChild(procMsg);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
const ticketId=Math.floor(10000000+Math.random()*90000000);
const start=getMDTime();
const end=getMDTime(3600000);
const ticketMsg=document.createElement('div');
ticketMsg.className='msg left';
ticketMsg.innerHTML=`Bilet electronic nr.<br><span class="msg-link">${ticketId}</span><br>28.04.2026<br>Valabil 1 ora (de la ${start} pina la ${end} )<br>Pret 6 MDL<br>Numar de bord ${num}`;
chat.appendChild(ticketMsg);
chat.scrollTop=chat.scrollHeight;
},800);
},500);

input.value='';
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
